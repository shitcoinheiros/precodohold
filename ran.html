<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoTracker Pro - Mobile Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main: #0b0e11;
            --bg-card: #181a20;
            --bg-hover: #1e2329;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --binance-yellow: #f3ba2f;
            --up-color: #0ecb81;
            --down-color: #f6465d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* Evita scroll na página principal quando o modal abre */
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .cmc-table-row { cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #2b3139; }
        .cmc-table-row:active { background-color: var(--bg-hover); }
        .negative-price { color: var(--down-color); }
        .positive-price { color: var(--up-color); }

        @keyframes flash-green { from { background-color: rgba(14, 203, 129, 0.2); } to { background-color: transparent; } }
        @keyframes flash-red { from { background-color: rgba(246, 70, 93, 0.2); } to { background-color: transparent; } }
        .price-up { animation: flash-green 0.6s ease-out; }
        .price-down { animation: flash-red 0.6s ease-out; }

        /* MODAL TERMINAL OCUPANDO 100% DA ALTURA */
        #chart-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            z-index: 2000;
            flex-direction: column;
            height: 100vh;
        }

        .sub-tab {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            position: relative;
        }
        .sub-tab.active { color: var(--text-main); }
        .sub-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 2px;
            background: var(--binance-yellow);
            border-radius: 2px;
        }

        .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 10px; color: var(--text-main); font-weight: 600; }

        .btn-timeframe {
            padding: 2px 6px;
            font-size: 11px;
            color: var(--text-muted);
            border-radius: 4px;
        }
        .btn-timeframe.active {
            color: var(--binance-yellow);
            font-weight: 700;
            background: rgba(243, 186, 47, 0.1);
        }

        /* CONTAINER DO GRÁFICO MAXIMIZADO */
        #chart-wrapper {
            flex: 1; /* Ocupa todo o espaço disponível */
            position: relative;
            background: var(--bg-main);
            overflow: hidden;
        }
        #main-chart-container { width: 100%; height: 100%; }

        .indicator-legend {
            position: absolute;
            top: 5px;
            left: 10px;
            z-index: 20;
            font-size: 10px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: rgba(11, 14, 17, 0.6);
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* RANGE DE PROFUNDIDADE REFINADO E MAIS FINO */
        .depth-range-container {
            background-color: #181a20;
            padding: 8px 16px;
            border-top: 1px solid #2b3139;
        }

        .battle-arena {
            position: relative;
            height: 24px; /* Mais fino que o anterior */
            display: flex;
            align-items: center;
            margin: 4px 0;
        }

        .bull-icon, .bear-icon {
            position: absolute;
            width: 24px; /* Ícones menores */
            height: 24px;
            z-index: 50;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bull-icon { left: 0; }
        .bear-icon { right: 0; }

        .depth-bar-wrapper {
            position: absolute;
            left: 32px;
            right: 32px;
            height: 4px; /* Barra mais fina */
            background: #2b3139;
            border-radius: 2px;
            overflow: hidden;
            display: flex;
        }

        #bid-fill {
            height: 100%;
            background: var(--up-color);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #ask-fill {
            flex-grow: 1;
            height: 100%;
            background: var(--down-color);
        }

        .battle-line {
            position: absolute;
            top: -4px;
            bottom: -4px;
            width: 1.5px;
            background: white;
            box-shadow: 0 0 6px white;
            z-index: 60;
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow-green { filter: drop-shadow(0 0 6px var(--up-color)); transform: scale(1.15); }
        .glow-red { filter: drop-shadow(0 0 6px var(--down-color)); transform: scale(1.15); }

    </style>
</head>
<body>

    <nav class="bg-[#181a20] border-b border-[#2b3139] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-lg font-black tracking-tighter text-white">BIN<span class="text-[var(--binance-yellow)]">PRO</span></span>
                <div id="fg-index-container" class="hidden sm:flex border border-[#474d57] rounded-full px-2 py-0.5 items-center bg-[#2b3139]">
                    <span id="fg-value" class="font-bold text-[10px] mr-1 text-white">--</span>
                    <span class="text-[7px] uppercase font-bold opacity-70 text-white">F&G</span>
                </div>
            </div>
            <div class="relative flex-1 max-w-[140px] ml-2">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-[10px]"></i>
                <input type="text" id="searchInput" placeholder="Search..." class="w-full pl-8 pr-3 py-1.5 bg-[#2b3139] border-none rounded-md text-xs text-white outline-none">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-2">
        <div class="bg-[#181a20] rounded-lg border border-[#2b3139] overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-[#1e2329] text-[9px] uppercase text-[#848e9c]">
                    <tr>
                        <th class="px-3 py-2">Ativo</th>
                        <th class="px-3 py-2 text-right">Preço</th>
                        <th class="px-3 py-2 text-right">Variação</th>
                    </tr>
                </thead>
                <tbody id="crypto-table-body" class="divide-y divide-[#2b3139]"></tbody>
            </table>
        </div>
    </main>

    <!-- TERMINAL MODAL (FULLSCREEN) -->
    <div id="chart-modal">
        <div class="px-4 py-2 flex items-center justify-between border-b border-[#2b3139] bg-[#181a20]">
            <div class="flex items-center space-x-3">
                <button onclick="closeChart()"><i class="fas fa-chevron-left text-lg text-white"></i></button>
                <div class="flex flex-col">
                    <span id="modal-coin-pair" class="font-bold text-sm text-white">BTC/USDT</span>
                    <span class="text-[9px] text-gray-500 font-medium">Binance Real-time</span>
                </div>
            </div>
            <div class="flex space-x-4"><i class="far fa-star text-md text-gray-400"></i><i class="fas fa-share-alt text-md text-gray-400"></i></div>
        </div>

        <div class="flex border-b border-[#2b3139] px-2 bg-[#181a20]">
            <button class="sub-tab active">Gráfico</button>
            <button class="sub-tab">Livro</button>
            <button class="sub-tab">Trades</button>
        </div>

        <div class="px-4 py-2 grid grid-cols-2 gap-2 bg-[#0b0e11]">
            <div class="flex flex-col justify-center">
                <div id="modal-live-price" class="text-2xl font-bold text-white leading-none">0.00</div>
                <div id="modal-price-percent" class="text-[11px] font-bold mt-1 positive-price">+0.00%</div>
            </div>
            <div class="grid grid-cols-2 gap-x-2 self-center">
                <div class="flex flex-col"><span class="stat-label">24h High</span><span id="stat-high" class="stat-value text-white">--</span></div>
                <div class="flex flex-col"><span class="stat-label">24h Low</span><span id="stat-low" class="stat-value text-white">--</span></div>
            </div>
        </div>

        <!-- CONTROLES DO GRÁFICO COMPACTOS -->
        <div class="px-3 py-1 flex items-center justify-between border-y border-[#1e2329] bg-[#0b0e11]">
            <div class="flex items-center space-x-1">
                <button class="btn-timeframe" onclick="changeTimeframe('15m', this)">15m</button>
                <button class="btn-timeframe active" onclick="changeTimeframe('1h', this)">1h</button>
                <button class="btn-timeframe" onclick="changeTimeframe('4h', this)">4h</button>
                <button class="btn-timeframe" onclick="changeTimeframe('1d', this)">1d</button>
            </div>
            <div class="flex space-x-2 text-gray-500 text-[9px] font-bold uppercase">
                <button id="btn-ma" class="px-1" onclick="toggleIndicator('MA')">MA</button>
                <button id="btn-boll" class="px-1" onclick="toggleIndicator('BOLL')">BOLL</button>
            </div>
        </div>

        <!-- O GRÁFICO AGORA É O FOCO PRINCIPAL -->
        <div id="chart-wrapper">
            <div id="chart-legend" class="indicator-legend"></div>
            <div id="main-chart-container"></div>
        </div>

        <!-- RANGE DE PROFUNDIDADE REFINADO -->
        <div class="depth-range-container">
            <div class="flex justify-between text-[8px] font-bold mb-1 uppercase tracking-wider">
                <span class="text-[var(--up-color)]" id="bid-pct-label">50.0% BUY</span>
                <span class="text-[var(--down-color)]" id="ask-pct-label">50.0% SELL</span>
            </div>
            
            <div class="battle-arena">
                <img src="https://i.postimg.cc/7PtYbG3F/1000383645-removebg-preview.png" class="bull-icon" id="bull-img">
                
                <div class="depth-bar-wrapper">
                    <div id="bid-fill" style="width: 50%"></div>
                    <div id="ask-fill"></div>
                    <div id="battle-line" class="battle-line" style="left: 50%"></div>
                </div>

                <img src="https://i.postimg.cc/TP5HjsF3/1000383648-removebg-preview.png" class="bear-icon" id="bear-img">
            </div>
        </div>

        <div class="p-2 bg-[#181a20] border-t border-[#2b3139] flex space-x-2">
            <button class="flex-1 bg-[var(--up-color)] text-white py-2.5 rounded-md font-bold text-sm active:opacity-80 transition-opacity">BUY</button>
            <button class="flex-1 bg-[var(--down-color)] text-white py-2.5 rounded-md font-bold text-sm active:opacity-80 transition-opacity">SELL</button>
        </div>
    </div>

    <script>
        const BINANCE_REST_24H = 'https://api.binance.com/api/v3/ticker/24hr';
        const BINANCE_WS_BASE = 'wss://stream.binance.com:9443/ws';

        let allCoins = [], tableWS = null, chartWS = null;
        let chart = null, candleSeries = null;
        let currentSymbol = '', currentTimeframe = '1h';
        let indicators = { MA: false, BOLL: false };
        let activeIndicatorSeries = [];
        let lastPrices = {};

        // Responsividade automática do gráfico
        const resizeObserver = new ResizeObserver(entries => {
            if (entries.length === 0 || !chart) return;
            const { width, height } = entries[0].contentRect;
            chart.applyOptions({ width, height });
        });

        async function initTable() {
            try {
                const res = await fetch(BINANCE_REST_24H);
                const data = await res.json();
                allCoins = data.filter(i => i.symbol.endsWith('USDT'))
                              .sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume)).slice(0, 40);
                renderTable();
                connectTableWS();
                updateFearGreed();
            } catch(e) {}
        }

        function renderTable() {
            const tbody = document.getElementById('crypto-table-body');
            tbody.innerHTML = allCoins.map(c => {
                const symbolOnly = c.symbol.replace('USDT','');
                const isPositive = parseFloat(c.priceChangePercent) >= 0;
                return `
                <tr class="cmc-table-row" onclick="openChart('${c.symbol}')">
                    <td class="px-3 py-3 flex items-center space-x-2">
                        <span class="font-bold text-white text-xs">${symbolOnly}</span>
                        <span class="text-[9px] text-gray-500">/USDT</span>
                    </td>
                    <td class="px-3 py-3 text-right mono text-xs text-white" id="price-${c.symbol}">${parseFloat(c.lastPrice).toLocaleString()}</td>
                    <td class="px-3 py-3 text-right font-bold text-[10px] ${isPositive ? 'positive-price' : 'negative-price'}">${parseFloat(c.priceChangePercent).toFixed(2)}%</td>
                </tr>`;
            }).join('');
        }

        function connectTableWS() {
            if (tableWS) tableWS.close();
            tableWS = new WebSocket(`${BINANCE_WS_BASE}/!miniTicker@arr`);
            tableWS.onmessage = (e) => {
                JSON.parse(e.data).forEach(item => {
                    const cell = document.getElementById(`price-${item.s}`);
                    if (cell) {
                        const val = parseFloat(item.c);
                        const old = lastPrices[item.s] || val;
                        cell.className = `px-3 py-3 text-right mono text-xs text-white ${val > old ? 'price-up' : val < old ? 'price-down' : ''}`;
                        cell.innerText = `${val.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                        lastPrices[item.s] = val;
                    }
                });
            };
        }

        async function updateFearGreed() {
            try {
                const res = await fetch('https://api.alternative.me/fng/?limit=1');
                const data = await res.json();
                document.getElementById('fg-value').innerText = data.data[0].value;
            } catch (e) {}
        }

        async function openChart(symbol) {
            currentSymbol = symbol;
            const coin = allCoins.find(c => c.symbol === symbol);
            document.getElementById('chart-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Trava o scroll do fundo
            document.getElementById('modal-coin-pair').innerText = symbol.replace('USDT', ' / USDT');
            
            if(coin) {
                document.getElementById('stat-high').innerText = parseFloat(coin.highPrice).toLocaleString();
                document.getElementById('stat-low').innerText = parseFloat(coin.lowPrice).toLocaleString();
            }
            resizeObserver.observe(document.getElementById('chart-wrapper'));
            setTimeout(() => initChart(), 100);
        }

        function closeChart() {
            document.getElementById('chart-modal').style.display = 'none';
            document.body.style.overflow = ''; 
            resizeObserver.disconnect();
            if (chartWS) chartWS.close();
            if (chart) { chart.remove(); chart = null; }
        }

        async function initChart() {
            const container = document.getElementById('main-chart-container');
            container.innerHTML = '';
            activeIndicatorSeries = [];
            
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0b0e11' }, textColor: '#848e9c', fontSize: 10 },
                grid: { vertLines: { color: '#161a1e' }, horzLines: { color: '#161a1e' } },
                rightPriceScale: { borderColor: '#2b3139', scaleMargins: { top: 0.1, bottom: 0.2 } },
                timeScale: { borderColor: '#2b3139', timeVisible: true, borderVisible: true },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
            });

            candleSeries = chart.addCandlestickSeries({ 
                upColor: '#0ecb81', 
                downColor: '#f6465d', 
                borderVisible: false,
                wickUpColor: '#0ecb81',
                wickDownColor: '#f6465d'
            });
            
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${currentTimeframe}&limit=300`);
            const data = await res.json();
            const candles = data.map(d => ({ 
                time: d[0] / 1000, 
                open: parseFloat(d[1]), 
                high: parseFloat(d[2]), 
                low: parseFloat(d[3]), 
                close: parseFloat(d[4]) 
            }));
            candleSeries.setData(candles);
            updateIndicators(candles);

            if (chartWS) chartWS.close();
            chartWS = new WebSocket(`${BINANCE_WS_BASE}/${currentSymbol.toLowerCase()}@kline_${currentTimeframe}`);
            chartWS.onmessage = (e) => {
                const k = JSON.parse(e.data).k;
                const price = parseFloat(k.c);
                const open = parseFloat(k.o);
                const high = parseFloat(k.h);
                const low = parseFloat(k.l);
                
                candleSeries.update({ time: k.t / 1000, open: open, high: high, low: low, close: price });
                
                document.getElementById('modal-live-price').innerText = price.toLocaleString(undefined, {minimumFractionDigits: 2});
                const pc = ((price - open) / open * 100).toFixed(2);
                document.getElementById('modal-price-percent').innerText = `${pc >= 0 ? '+' : ''}${pc}%`;
                document.getElementById('modal-price-percent').className = `text-[11px] font-bold mt-1 ${pc >= 0 ? 'positive-price' : 'negative-price'}`;
                
                // O Range agora reage à força da vela atual (distância entre preço e mín/máx)
                const rangeStrength = (price - low) / (high - low || 1);
                updateDepthRange(rangeStrength * 100);
            };
        }

        // Lógica de Range refinada para ser baseada na força do movimento atual
        function updateDepthRange(strength) {
            const bidFill = document.getElementById('bid-fill');
            const battleLine = document.getElementById('battle-line');
            const bullImg = document.getElementById('bull-img');
            const bearImg = document.getElementById('bear-img');
            const bidLabel = document.getElementById('bid-pct-label');
            const askLabel = document.getElementById('ask-pct-label');

            // Suavização do valor (mínimo 20%, máximo 80% para evitar encostar nos ícones)
            let bidPct = Math.min(Math.max(strength, 20), 80);
            let askPct = 100 - bidPct;

            bidFill.style.width = `${bidPct}%`;
            battleLine.style.left = `${bidPct}%`;

            bidLabel.innerText = `${bidPct.toFixed(1)}% BUY`;
            askLabel.innerText = `${askPct.toFixed(1)}% SELL`;

            // Brilho visual no vencedor atual
            bullImg.classList.toggle('glow-green', bidPct > 55);
            bearImg.classList.toggle('glow-red', askPct > 55);
        }

        function toggleIndicator(type) {
            indicators[type] = !indicators[type];
            const btn = document.getElementById(`btn-${type.toLowerCase()}`);
            btn.classList.toggle('text-[var(--binance-yellow)]', indicators[type]);
            initChart();
        }

        function updateIndicators(candles) {
            const legend = document.getElementById('chart-legend');
            legend.innerHTML = '';
            
            if (indicators.MA) {
                const ma7 = candles.map((val, index) => {
                    if (index < 7) return { time: val.time, value: val.close };
                    const sum = candles.slice(index - 7, index).reduce((a, b) => a + b.close, 0);
                    return { time: val.time, value: sum / 7 };
                });
                const line = chart.addLineSeries({ color: '#f3ba2f', lineWidth: 1, priceLineVisible: false });
                line.setData(ma7);
                legend.innerHTML += `<span style="color: #f3ba2f">MA(7): ${ma7[ma7.length-1].value.toFixed(2)}</span>`;
            }
        }

        function changeTimeframe(tf, btn) {
            currentTimeframe = tf;
            document.querySelectorAll('.btn-timeframe').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initChart();
        }

        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toUpperCase();
            document.querySelectorAll('.cmc-table-row').forEach(row => row.style.display = row.innerText.includes(term) ? '' : 'none');
        };

        initTable();
    </script>
</body>
</html>
