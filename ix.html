<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoTracker Pro - Mobile Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main: #0b0e11;
            --bg-card: #181a20;
            --bg-hover: #1e2329;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --binance-yellow: #f3ba2f;
            --up-color: #0ecb81;
            --down-color: #f6465d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Estilo da Tabela Principal */
        .cmc-table-row { cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #2b3139; }
        .cmc-table-row:active { background-color: var(--bg-hover); }
        .negative-price { color: var(--down-color); }
        .positive-price { color: var(--up-color); }

        @keyframes flash-green { from { background-color: rgba(14, 203, 129, 0.2); } to { background-color: transparent; } }
        @keyframes flash-red { from { background-color: rgba(246, 70, 93, 0.2); } to { background-color: transparent; } }
        .price-up { animation: flash-green 0.6s ease-out; }
        .price-down { animation: flash-red 0.6s ease-out; }

        /* MODAL TERMINAL ESTILO BINANCE */
        #chart-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            z-index: 2000;
            flex-direction: column;
        }

        .sub-tab {
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            position: relative;
        }
        .sub-tab.active {
            color: var(--text-main);
        }
        .sub-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 3px;
            background: var(--binance-yellow);
            border-radius: 2px;
        }

        .stat-label { font-size: 10px; color: var(--text-muted); }
        .stat-value { font-size: 11px; color: var(--text-main); font-weight: 600; }

        .btn-timeframe {
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-muted);
            border-radius: 4px;
        }
        .btn-timeframe.active {
            color: var(--binance-yellow);
            font-weight: 700;
        }

        .btn-buy { background-color: #0ecb81; color: white; border-radius: 8px; font-weight: 700; }
        .btn-sell { background-color: #f6465d; color: white; border-radius: 8px; font-weight: 700; }

        #main-chart-container { width: 100%; height: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            color: var(--text-muted);
            font-size: 10px;
            gap: 4px;
        }
        .bottom-nav-item.active { color: var(--binance-yellow); }

        /* Legendas de indicadores flutuantes */
        .indicator-legend {
            position: absolute;
            top: 5px;
            left: 10px;
            z-index: 20;
            font-size: 10px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
    </style>
</head>
<body>

    <nav class="bg-[#181a20] border-b border-[#2b3139] sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-black tracking-tighter">BIN<span class="text-[var(--binance-yellow)]">PRO</span></span>
                <div id="fg-index-container" class="flex border border-[#474d57] rounded-full px-3 py-1 space-x-2 items-center transition-all duration-500">
                    <span id="fg-value" class="font-bold text-xs">--</span>
                    <span id="fg-label" class="text-[9px] uppercase font-bold opacity-80">Loading...</span>
                </div>
            </div>
            
            <div class="relative flex-1 max-w-[150px] sm:max-w-xs ml-2">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                <input type="text" id="searchInput" placeholder="Procurar..." class="w-full pl-9 pr-4 py-2 bg-[#2b3139] border-none rounded-lg text-sm focus:ring-1 focus:ring-[var(--binance-yellow)] text-white placeholder-gray-500">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-2 sm:p-6">
        <div class="bg-[#181a20] rounded-xl border border-[#2b3139] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-[#1e2329] text-[10px] uppercase text-[#848e9c] tracking-wider">
                        <tr>
                            <th class="px-4 py-4 font-bold">Ativo</th>
                            <th class="px-4 py-4 text-right font-bold">Preço</th>
                            <th class="px-4 py-4 text-right font-bold">Variação</th>
                            <th class="px-4 py-4 text-right font-bold hide-mobile">Vol 24h</th>
                        </tr>
                    </thead>
                    <tbody id="crypto-table-body" class="divide-y divide-[#2b3139]"></tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-16 bg-[#181a20] border-t border-[#2b3139] flex items-center z-[1000] md:hidden">
        <button class="bottom-nav-item active"><i class="fas fa-chart-line text-lg"></i><span>Mercados</span></button>
        <button class="bottom-nav-item"><i class="fas fa-exchange-alt text-lg"></i><span>Trades</span></button>
        <button class="bottom-nav-item"><i class="fas fa-wallet text-lg"></i><span>Carteira</span></button>
        <button class="bottom-nav-item"><i class="fas fa-ellipsis-h text-lg"></i><span>Mais</span></button>
    </nav>

    <!-- TERMINAL MODAL -->
    <div id="chart-modal">
        <div class="px-4 py-3 flex items-center justify-between border-b border-[#2b3139]">
            <div class="flex items-center space-x-3">
                <button onclick="closeChart()"><i class="fas fa-arrow-left text-xl"></i></button>
                <div class="flex items-center space-x-1">
                    <span id="modal-coin-pair" class="font-bold text-lg tracking-tight">BTC/USDT</span>
                    <i class="fas fa-caret-down text-xs text-gray-500"></i>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <i class="far fa-star text-lg text-gray-400"></i>
                <i class="fas fa-bell text-lg text-gray-400"></i>
            </div>
        </div>

        <div class="flex border-b border-[#2b3139] px-2 overflow-x-auto no-scrollbar">
            <button class="sub-tab active">Valor</button>
            <button class="sub-tab">Informações</button>
            <button class="sub-tab">Dados de Transação</button>
            <button class="sub-tab">Square</button>
        </div>

        <div class="p-4 grid grid-cols-2 gap-4">
            <div>
                <div id="modal-live-price" class="text-3xl font-bold positive-price">0.00</div>
                <div class="text-sm mt-1 text-gray-400 flex space-x-2">
                    <span id="modal-price-brl">R$ 0,00</span>
                    <span id="modal-price-percent" class="positive-price">+0.00%</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-y-1 gap-x-2">
                <div class="flex flex-col">
                    <span class="stat-label">Máximo 24h</span>
                    <span id="stat-high" class="stat-value">0.00</span>
                </div>
                <div class="flex flex-col">
                    <span class="stat-label">Vol 24h(BTC)</span>
                    <span id="stat-vol-coin" class="stat-value">0.00</span>
                </div>
                <div class="flex flex-col">
                    <span class="stat-label">Mínimo 24h</span>
                    <span id="stat-low" class="stat-value">0.00</span>
                </div>
                <div class="flex flex-col">
                    <span class="stat-label">Vol 24h(USDT)</span>
                    <span id="stat-vol-quote" class="stat-value">0.00</span>
                </div>
            </div>
        </div>

        <div class="px-4 py-2 flex items-center justify-between border-y border-[#1e2329] bg-[#0b0e11]">
            <div class="flex items-center space-x-2 overflow-x-auto no-scrollbar">
                <button class="btn-timeframe" onclick="changeTimeframe('15m', this)">15m</button>
                <button class="btn-timeframe active" onclick="changeTimeframe('1h', this)">1h</button>
                <button class="btn-timeframe" onclick="changeTimeframe('4h', this)">4h</button>
                <button class="btn-timeframe" onclick="changeTimeframe('1d', this)">1d</button>
                <button class="btn-timeframe">Mais <i class="fas fa-caret-down text-[8px]"></i></button>
            </div>
            <div class="flex space-x-3 text-gray-400 text-xs font-bold uppercase">
                <button id="btn-ma" onclick="toggleIndicator('MA')">MA</button>
                <button id="btn-boll" onclick="toggleIndicator('BOLL')">BOLL</button>
                <button><i class="fas fa-th-large"></i></button>
            </div>
        </div>

        <div id="chart-wrapper" class="flex-1 relative bg-[#0b0e11]">
            <div id="chart-legend" class="indicator-legend"></div>
            <div id="main-chart-container"></div>
        </div>

        <div class="p-3 bg-[#181a20] border-t border-[#2b3139] flex space-x-3">
            <div class="flex flex-col items-center justify-center px-2 text-gray-400">
                <i class="fas fa-comment-dots text-lg"></i>
                <span class="text-[9px]">Mais</span>
            </div>
            <div class="flex flex-col items-center justify-center px-2 text-gray-400">
                <i class="fas fa-th text-lg"></i>
                <span class="text-[9px]">Hub</span>
            </div>
            <div class="flex flex-col items-center justify-center px-2 text-gray-400">
                <i class="fas fa-bolt text-lg"></i>
                <span class="text-[9px]">Margem</span>
            </div>
            <button class="flex-1 btn-buy h-11">Comprar</button>
            <button class="flex-1 btn-sell h-11">Vender</button>
        </div>
    </div>

    <script>
        const BINANCE_REST_24H = 'https://api.binance.com/api/v3/ticker/24hr';
        const BINANCE_WS_BASE = 'wss://stream.binance.com:9443/ws';
        const FNG_API = 'https://api.alternative.me/fng/?limit=1';

        let allCoins = [];
        let tableWS = null, chartWS = null;
        let chart = null, candleSeries = null;
        let currentSymbol = '', currentTimeframe = '1h';
        let indicators = { MA: false, BOLL: false };
        let activeIndicatorSeries = [];
        let lastPrices = {};

        const resizeObserver = new ResizeObserver(entries => {
            if (entries.length === 0 || !chart) return;
            const { width, height } = entries[0].contentRect;
            chart.applyOptions({ width, height });
        });

        async function initTable() {
            try {
                const res = await fetch(BINANCE_REST_24H);
                const data = await res.json();
                allCoins = data.filter(i => i.symbol.endsWith('USDT'))
                              .sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                              .slice(0, 50);
                renderTable();
                connectTableWS();
                updateFearGreed();
            } catch(e) { console.error("Erro ao carregar mercado."); }
        }

        function renderTable() {
            const tbody = document.getElementById('crypto-table-body');
            tbody.innerHTML = allCoins.map(c => {
                const symbolOnly = c.symbol.replace('USDT','');
                const isPositive = parseFloat(c.priceChangePercent) >= 0;
                return `
                <tr class="cmc-table-row" onclick="openChart('${c.symbol}')">
                    <td class="px-4 py-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full bg-[#2b3139] flex items-center justify-center overflow-hidden border border-[#474d57]">
                                <img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${symbolOnly.toLowerCase()}.png" 
                                      onerror="this.src='https://ui-avatars.com/api/?name=${symbolOnly}&background=2b3139&color=fff'" 
                                      class="w-5 h-5 object-contain">
                            </div>
                            <span class="font-bold text-white text-sm tracking-tight">${symbolOnly}</span>
                        </div>
                    </td>
                    <td class="px-4 py-4 text-right mono font-bold text-sm" id="price-${c.symbol}">
                        $${parseFloat(c.lastPrice).toLocaleString()}
                    </td>
                    <td class="px-4 py-4 text-right font-bold text-xs ${isPositive ? 'positive-price' : 'negative-price'}">
                        ${isPositive ? '+' : ''}${parseFloat(c.priceChangePercent).toFixed(2)}%
                    </td>
                    <td class="px-4 py-4 text-right text-[#848e9c] mono text-[10px] hide-mobile">
                        $${Math.round(parseFloat(c.quoteVolume)/1000000).toLocaleString()}M
                    </td>
                </tr>`;
            }).join('');
        }

        function connectTableWS() {
            if (tableWS) tableWS.close();
            tableWS = new WebSocket(`${BINANCE_WS_BASE}/!miniTicker@arr`);
            tableWS.onmessage = (e) => {
                JSON.parse(e.data).forEach(item => {
                    const cell = document.getElementById(`price-${item.s}`);
                    if (cell) {
                        const val = parseFloat(item.c);
                        const old = lastPrices[item.s] || val;
                        if (val > old) cell.className = 'px-4 py-4 text-right mono font-bold text-sm price-up';
                        else if (val < old) cell.className = 'px-4 py-4 text-right mono font-bold text-sm price-down';
                        cell.innerText = `$${val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}`;
                        lastPrices[item.s] = val;
                    }
                });
            };
        }

        async function updateFearGreed() {
            try {
                const res = await fetch(FNG_API);
                const data = await res.json();
                const fng = data.data[0];
                document.getElementById('fg-value').innerText = fng.value;
                document.getElementById('fg-label').innerText = fng.value_classification;
            } catch (e) {}
        }

        async function openChart(symbol) {
            currentSymbol = symbol;
            const coinData = allCoins.find(c => c.symbol === symbol);
            document.getElementById('chart-modal').style.display = 'flex';
            document.getElementById('modal-coin-pair').innerText = symbol.replace('USDT', '/USDT');
            
            if(coinData) {
                document.getElementById('stat-high').innerText = parseFloat(coinData.highPrice).toLocaleString();
                document.getElementById('stat-low').innerText = parseFloat(coinData.lowPrice).toLocaleString();
                document.getElementById('stat-vol-coin').innerText = Math.round(parseFloat(coinData.volume)).toLocaleString();
                document.getElementById('stat-vol-quote').innerText = (parseFloat(coinData.quoteVolume)/1000000).toFixed(2) + "M";
                const pChange = parseFloat(coinData.priceChangePercent);
                document.getElementById('modal-price-percent').innerText = (pChange >= 0 ? '+' : '') + pChange.toFixed(2) + '%';
                document.getElementById('modal-price-percent').className = pChange >= 0 ? 'positive-price' : 'negative-price';
            }

            resizeObserver.observe(document.getElementById('chart-wrapper'));
            setTimeout(() => initChart(), 100);
        }

        function closeChart() {
            document.getElementById('chart-modal').style.display = 'none';
            resizeObserver.disconnect();
            if (chartWS) chartWS.close();
            if (chart) { chart.remove(); chart = null; }
        }

        async function initChart() {
            const container = document.getElementById('main-chart-container');
            container.innerHTML = '';
            activeIndicatorSeries = [];
            
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0b0e11' }, textColor: '#848e9c', fontSize: 10 },
                grid: { vertLines: { color: '#161a1e' }, horzLines: { color: '#161a1e' } },
                rightPriceScale: { borderColor: '#2b3139' },
                timeScale: { borderColor: '#2b3139', timeVisible: true }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false,
                wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
            });

            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${currentTimeframe}&limit=500`);
            const data = await res.json();
            const candles = data.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]), high: parseFloat(d[2]),
                low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            
            candleSeries.setData(candles);
            updateIndicators(candles);

            if (chartWS) chartWS.close();
            chartWS = new WebSocket(`${BINANCE_WS_BASE}/${currentSymbol.toLowerCase()}@kline_${currentTimeframe}`);
            chartWS.onmessage = (e) => {
                const k = JSON.parse(e.data).k;
                const price = parseFloat(k.c);
                const isUp = price >= parseFloat(k.o);
                
                candleSeries.update({ time: k.t / 1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: price });
                
                const priceEl = document.getElementById('modal-live-price');
                priceEl.innerText = price.toLocaleString(undefined, {minimumFractionDigits: 2});
                priceEl.className = isUp ? 'text-3xl font-bold positive-price' : 'text-3xl font-bold negative-price';
                document.getElementById('modal-price-brl').innerText = 'R$ ' + (price * 5.85).toLocaleString(undefined, {minimumFractionDigits: 2});
            };
            chart.timeScale().fitContent();
        }

        // CORREÇÃO: Implementação da função toggleIndicator
        function toggleIndicator(type) {
            indicators[type] = !indicators[type];
            const btn = document.getElementById(`btn-${type.toLowerCase()}`);
            if (indicators[type]) {
                btn.classList.add('text-[var(--binance-yellow)]');
            } else {
                btn.classList.remove('text-[var(--binance-yellow)]');
            }
            initChart(); // Recarrega o gráfico com os indicadores aplicados
        }

        function updateIndicators(candles) {
            const legend = document.getElementById('chart-legend');
            legend.innerHTML = '';

            if (indicators.MA) {
                const ma7 = calculateSMA(candles, 7);
                const maLine = chart.addLineSeries({ color: '#f3ba2f', lineWidth: 1, priceLineVisible: false });
                maLine.setData(ma7);
                activeIndicatorSeries.push(maLine);
                legend.innerHTML += `<span style="color: #f3ba2f">MA(7): ${ma7[ma7.length-1].value.toFixed(2)}</span>`;
            }

            if (indicators.BOLL) {
                const boll = calculateBOLL(candles, 20, 2);
                const upLine = chart.addLineSeries({ color: '#f3ba2f', lineWidth: 1, priceLineVisible: false });
                const midLine = chart.addLineSeries({ color: '#e6007a', lineWidth: 1, priceLineVisible: false });
                const dnLine = chart.addLineSeries({ color: '#7042f4', lineWidth: 1, priceLineVisible: false });
                
                upLine.setData(boll.map(b => ({ time: b.time, value: b.upper })));
                midLine.setData(boll.map(b => ({ time: b.time, value: b.mid })));
                dnLine.setData(boll.map(b => ({ time: b.time, value: b.lower })));
                
                activeIndicatorSeries.push(upLine, midLine, dnLine);
                const last = boll[boll.length-1];
                legend.innerHTML += `
                    <div class="flex gap-2">
                        <span style="color: #f3ba2f">UP: ${last.upper.toFixed(2)}</span>
                        <span style="color: #e6007a">MB: ${last.mid.toFixed(2)}</span>
                        <span style="color: #7042f4">DN: ${last.lower.toFixed(2)}</span>
                    </div>
                `;
            }
        }

        function calculateSMA(data, period) {
            return data.map((val, index) => {
                if (index < period) return { time: val.time, value: val.close };
                const subset = data.slice(index - period, index);
                const sum = subset.reduce((a, b) => a + b.close, 0);
                return { time: val.time, value: sum / period };
            });
        }

        function calculateBOLL(data, period, std) {
            return data.map((val, index) => {
                if (index < period) return { time: val.time, upper: val.high, mid: val.close, lower: val.low };
                const subset = data.slice(index - period, index).map(d => d.close);
                const avg = subset.reduce((a, b) => a + b, 0) / period;
                const variance = subset.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / period;
                const deviation = Math.sqrt(variance);
                return { time: val.time, mid: avg, upper: avg + (std * deviation), lower: avg - (std * deviation) };
            });
        }

        function changeTimeframe(tf, btn) {
            currentTimeframe = tf;
            document.querySelectorAll('.btn-timeframe').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initChart();
        }

        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toUpperCase();
            document.querySelectorAll('.cmc-table-row').forEach(row => {
                row.style.display = row.innerText.includes(term) ? '' : 'none';
            });
        };

        initTable();
    </script>
</body>
</html>
