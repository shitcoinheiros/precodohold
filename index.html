<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoTracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="bg-[#181a20] border-b border-[#2b3139] sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-black">BIN<span class="text-[var(--binance-yellow)]">PRO</span></span>
                <div id="fg-index-container" class="flex border rounded-full px-3 py-1 space-x-2 items-center">
                    <span id="fg-value" class="font-bold text-xs">--</span>
                    <span id="fg-label" class="text-[9px] uppercase font-bold opacity-80">...</span>
                </div>
            </div>
            
            <div class="relative flex-1 max-w-xs">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                <input type="text" id="searchInput" placeholder="Digite o nome da moeda..." 
                    class="w-full pl-9 pr-4 py-2 bg-[#2b3139] border-none rounded-lg text-sm text-white focus:ring-1 focus:ring-[var(--binance-yellow)]">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-2">
        <div class="bg-[#181a20] rounded-xl border border-[#2b3139] overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#1e2329] text-[10px] uppercase text-[#848e9c]">
                    <tr>
                        <th class="px-4 py-4">Ativo</th>
                        <th class="px-4 py-4 text-right">Preço</th>
                        <th class="px-4 py-4 text-right">24h %</th>
                    </tr>
                </thead>
                <tbody id="crypto-table-body" class="divide-y divide-[#2b3139]"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal do Gráfico -->
    <div id="chart-modal">
        <div class="p-3 bg-[#1e2329] flex items-center justify-between">
            <button onclick="closeChart()" class="w-10 h-10"><i class="fas fa-arrow-left"></i></button>
            <div class="text-center">
                <div id="modal-coin-name" class="text-xs font-bold text-[#848e9c]">---</div>
                <div id="live-price-badge" class="mono text-xl font-bold">---</div>
            </div>
            <div class="w-10"></div>
        </div>
        <div id="chart-wrapper" class="flex-1">
            <div id="main-chart-container"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
